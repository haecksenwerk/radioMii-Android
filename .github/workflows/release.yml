name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

      - name: Build signed APK
        env:
          KEYSTORE_PATH: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/radioMii-${{ github.ref_name }}.apk"

      - name: Read changelog
        id: changelog
        run: |
          VERSION_CODE=$(grep -E '^\s*versionCode\s*=' app/build.gradle.kts | grep -oE '[0-9]+')
          CHANGELOG_FILE="fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          if [ -f "$CHANGELOG_FILE" ]; then
            BODY=$(cat "$CHANGELOG_FILE")
          else
            BODY="No changelog available for version code ${VERSION_CODE}."
          fi
          # Write to a temp file to avoid issues with multiline strings in env
          echo "$BODY" > /tmp/release_notes.txt
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "radioMii ${{ github.ref_name }}"
          target_commitish: main
          body_path: /tmp/release_notes.txt
          files: "app/build/outputs/apk/release/radioMii-${{ github.ref_name }}.apk"

